<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STAFF PORTAL - SAFETY WEEK 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    :root {
      --primary-color: #1e293b;
      --accent-color: #3b82f6;
      --bg-color: #f8fafc;
    }
    body { 
      font-family: 'Sarabun', 'Inter', sans-serif; 
      background-color: var(--bg-color); 
      color: #334155;
    }
    .fw-number { font-family: 'Inter', sans-serif; font-weight: 600; }
    
    /* Header Area */
    .main-header { 
      background: var(--primary-color); 
      color: white; 
      padding: 30px 0 60px 0; 
      border-radius: 0 0 40px 40px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    /* Tabs Styling */
    .nav-pills { background: rgba(255,255,255,0.1); padding: 5px; border-radius: 16px; display: inline-flex; }
    .nav-pills .nav-link { 
      color: rgba(255,255,255,0.8); 
      border-radius: 12px; 
      padding: 10px 20px;
      transition: 0.3s;
      font-size: 0.95rem;
    }
    .nav-pills .nav-link.active { 
      background-color: white !important; 
      color: var(--primary-color) !important; 
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }
    .nav-pills .nav-link i { margin-right: 8px; }

    /* Card Styling */
    .card-container { margin-top: -40px; }
    .card { 
      border-radius: 24px; 
      border: none; 
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05);
      overflow: hidden;
    }

    /* Mode Selection */
    .mode-card { 
      background: #ffffff; 
      border: 2px solid #f1f5f9; 
      border-radius: 20px; 
      padding: 24px; 
      text-align: center; 
      cursor: pointer; 
      transition: all 0.2s ease;
    }
    .mode-card.active-in { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; }
    .mode-card.active-out { border-color: #ef4444; background: #fef2f2; color: #b91c1c; }
    
    /* Stats Grid */
    .stats-card { 
      background: white; 
      border-radius: 18px; 
      padding: 15px; 
      text-align: center; 
      border: 1px solid #f1f5f9;
      transition: transform 0.2s;
    }
    .stats-card:hover { transform: translateY(-3px); }
    .stats-label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .stats-val { font-size: 1.4rem; color: var(--primary-color); display: block; }

    /* Elements */
    #canvas { width: 100%; border-radius: 20px; display: none; background: #000; margin-bottom: 20px; }
    .locked { opacity: 0.4; pointer-events: none; filter: grayscale(1); }
    .next-base-tag { 
      background: #dcfce7; 
      color: #166534; 
      padding: 6px 16px; 
      border-radius: 99px; 
      font-weight: 600; 
      display: inline-block;
    }
    .input-custom {
      border-radius: 14px;
      padding: 12px;
      border: 2px solid #e2e8f0;
    }
    .input-custom:focus { box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); border-color: #3b82f6; }
  </style>
</head>
<body>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzgVVgwTFIyLaUQBek8NpMtsUGK2tpx9byWMPZxaxp43FvJ84mr9h5G7CmxNrPrHVBe/exec"; 
  </script>

  <div class="main-header text-center">
    <div class="mb-3">
      <i class="bi bi-shield-check fs-1 text-info"></i>
      <h5 class="fw-bold mt-2">SAFETY WEEK 2026</h5>
      <p class="small opacity-75">Staff Control System</p>
    </div>
    
    <ul class="nav nav-pills" id="staffTabs">
      <li class="nav-item">
        <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#recordTab">
          <i class="bi bi-qr-code-scan"></i>บันทึกเวลา
        </button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="pill" data-bs-target="#monitorTab" onclick="updateStats()">
          <i class="bi bi-speedometer2"></i>Monitor
        </button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="pill" data-bs-target="#editTab">
          <i class="bi bi-person-gear"></i>แก้ไข
        </button>
      </li>
    </ul>
  </div>

  <div class="container card-container pb-5">
    <div class="tab-content">
      
      <div class="tab-pane fade show active" id="recordTab">
        <div class="card p-4">
          <div class="row g-3 mb-4">
            <div class="col-6">
              <div id="btnIn" class="mode-card" onclick="setMode('checkin')">
                <i class="bi bi-box-arrow-in-right fs-2"></i>
                <div class="mt-2 fw-bold">CHECK-IN</div>
              </div>
            </div>
            <div class="col-6">
              <div id="btnOut" class="mode-card" onclick="setMode('checkout')">
                <i class="bi bi-box-arrow-left fs-2"></i>
                <div class="mt-2 fw-bold">CHECK-OUT</div>
              </div>
            </div>
          </div>
          
          <div id="recordAction" class="locked text-center">
            <canvas id="canvas"></canvas>
            <div class="d-flex gap-2 mb-3">
              <button id="scanBtn" class="btn btn-primary w-100 py-3 fw-bold rounded-4 shadow-sm" onclick="startCamera()">
                <i class="bi bi-camera me-2"></i>เปิดกล้องสแกน QR
              </button>
              <button id="stopScanBtn" class="btn btn-danger py-3 fw-bold rounded-4 d-none" onclick="stopCamera()">
                <i class="bi bi-camera-video-off me-2"></i>ปิด
              </button>
            </div>
            <div class="input-group">
              <input type="text" id="recordId" class="form-control text-center py-3 fs-5 input-custom fw-number" placeholder="รหัสพนักงาน">
              <button id="recordSubmitBtn" class="btn btn-dark px-4 rounded-4 ms-2" onclick="submitRecord()">ยืนยัน</button>
            </div>
          </div>
        </div>
      </div>

      <div class="tab-pane fade" id="monitorTab">
        <div class="row row-cols-3 g-2 mb-4" id="statGrid"></div>
        <div class="card p-4">
          <div class="d-flex align-items-center mb-3">
            <i class="bi bi-search me-2 text-primary"></i>
            <h6 class="fw-bold mb-0">ตรวจสอบสถานะรายบุคคล</h6>
          </div>
          <div class="input-group mb-3">
            <input type="text" id="monId" class="form-control text-center py-2 input-custom fw-number" placeholder="กรอกรหัส">
            <button id="monBtn" class="btn btn-primary px-4 rounded-4 ms-2" onclick="getMonitor()">ค้นหา</button>
            <button class="btn btn-outline-secondary rounded-4 ms-1" onclick="resetMonitor()"><i class="bi bi-arrow-counterclockwise"></i></button>
          </div>
          <div id="monResult"></div>
        </div>
      </div>

      <div class="tab-pane fade" id="editTab">
        <div class="card p-4">
          <div id="searchBox">
            <div class="d-flex align-items-center mb-3">
              <i class="bi bi-pencil-square me-2 text-primary"></i>
              <h6 class="fw-bold mb-0">แก้ไขข้อมูลพนักงาน</h6>
            </div>
            <div class="input-group">
              <input type="text" id="editId" class="form-control text-center py-3 input-custom fw-number" placeholder="รหัสพนักงาน">
              <button id="editSearchBtn" class="btn btn-primary rounded-4 ms-2" onclick="searchUser()">ค้นหา</button>
            </div>
          </div>
          <div id="editForm" class="d-none mt-3">
            <input type="hidden" id="rowNum">
            <div class="mb-3"><label class="small text-muted mb-1">ชื่อ-นามสกุล</label><input type="text" id="nameBox" class="form-control input-custom"></div>
            <div class="row mb-3">
                <div class="col-6"><label class="small text-muted mb-1">แผนก</label><input type="text" id="deptBox" class="form-control input-custom"></div>
                <div class="col-6"><label class="small text-muted mb-1">ฝ่าย</label><input type="text" id="sectBox" class="form-control input-custom"></div>
            </div>
            <div class="mb-4"><label class="small text-muted mb-1">อีเมล</label><input type="email" id="emailBox" class="form-control input-custom fw-number"></div>
            <button id="editSaveBtn" class="btn btn-success w-100 py-3 mb-2 rounded-4 fw-bold" onclick="saveEdit()">
              <i class="bi bi-check-circle me-2"></i>บันทึกการเปลี่ยนแปลง
            </button>
            <button class="btn btn-link w-100 text-muted text-decoration-none" onclick="resetEdit()">ยกเลิก (ESC)</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    let currentMode = null;
    let video = document.createElement("video");
    let canvasElement = document.getElementById("canvas");
    let canvas = canvasElement.getContext("2d");
    let scanning = false;

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const activeTab = document.querySelector('.tab-pane.active').id;
        if (activeTab === 'recordTab') submitRecord();
        if (activeTab === 'monitorTab') getMonitor();
        if (activeTab === 'editTab') document.getElementById('editForm').classList.contains('d-none') ? searchUser() : saveEdit();
      }
      if (e.key === 'Escape') { stopCamera(); resetEdit(); resetMonitor(); }
    });

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('btnIn').className = 'mode-card' + (mode === 'checkin' ? ' active-in' : '');
      document.getElementById('btnOut').className = 'mode-card' + (mode === 'checkout' ? ' active-out' : '');
      document.getElementById('recordAction').classList.remove('locked');
      document.getElementById('recordId').focus();
    }

    async function callAPI(payload, btnId) {
      const btn = btnId ? document.getElementById(btnId) : null;
      if (btn) { 
        btn.disabled = true; 
        btn.dataset.oldContent = btn.innerHTML;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>'; 
      }
      try {
        const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        const res = await response.json();
        if (btn) { btn.disabled = false; btn.innerHTML = btn.dataset.oldContent; }
        return res;
      } catch (err) {
        if (btn) { btn.disabled = false; btn.innerText = 'Error'; }
        return null;
      }
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        scanning = true;
        canvasElement.style.display = "block";
        document.getElementById('scanBtn').classList.add('d-none');
        document.getElementById('stopScanBtn').classList.remove('d-none');
        video.srcObject = stream; video.setAttribute("playsinline", true); video.play();
        requestAnimationFrame(tick);
      } catch (err) { Swal.fire('Error', 'เข้าถึงกล้องไม่ได้', 'error'); }
    }

    function stopCamera() {
      scanning = false;
      if (video.srcObject) video.srcObject.getTracks().forEach(track => track.stop());
      canvasElement.style.display = "none";
      document.getElementById('scanBtn').classList.remove('d-none');
      document.getElementById('stopScanBtn').classList.add('d-none');
    }

    function tick() {
      if (video.readyState === video.HAVE_ENOUGH_DATA && scanning) {
        canvasElement.height = video.videoHeight; canvasElement.width = video.videoWidth;
        canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
        let code = jsQR(canvas.getImageData(0, 0, canvasElement.width, canvasElement.height).data, canvasElement.width, canvasElement.height);
        if (code) { document.getElementById('recordId').value = code.data; stopCamera(); submitRecord(); }
      }
      if (scanning) requestAnimationFrame(tick);
    }

    async function submitRecord() {
      let id = document.getElementById('recordId').value.trim();
      if (!id || !currentMode) return;
      Swal.fire({ title: 'กำลังประมวลผล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      const r = await callAPI({ action: 'staffAction', id: id, type: currentMode }, 'recordSubmitBtn');
      if (r) {
        Swal.fire({ icon: r.success ? 'success' : 'error', title: r.success ? 'สำเร็จ' : 'แจ้งเตือน', text: r.msg, borderRadius: '20px' });
        if (r.success) document.getElementById('recordId').value = '';
      }
    }

    async function updateStats() {
      try {
        const res = await fetch(`${API_URL}?action=getStats`);
        const s = await res.json();
        let html = '';
        for (let i = 1; i <= 9; i++) {
          let val = (s["Base"+i] !== undefined) ? s["Base"+i] : 0;
          html += `<div class="col"><div class="stats-card"><span class="stats-label">ฐาน ${i}</span><span class="stats-val fw-number">${val}</span></div></div>`;
        }
        document.getElementById('statGrid').innerHTML = html;
      } catch (e) {}
    }
    setInterval(updateStats, 60000);

    async function getMonitor() {
      let id = document.getElementById('monId').value.trim();
      if (!id) return;
      Swal.fire({ title: 'ค้นหา...', didOpen: () => Swal.showLoading() });
      const r = await callAPI({ action: 'monitor', id: id }, 'monBtn');
      Swal.close();
      if (r) {
        let html = '';
        if (r.type === 'AAA') {
          html = `<div class="table-responsive"><table class="table table-hover mt-2 align-middle"><thead><tr class="small text-muted"><th>ชื่อพนักงาน</th><th class="text-end">ความคืบหน้า</th></tr></thead><tbody>`;
          r.list.forEach(p => {
            html += `<tr class="cursor-pointer" onclick="Swal.fire({title:'${p.name}', html:'<div class=\'text-start\'>แผนก: ${p.dept}<br>ฝ่าย: ${p.sect}<br>ผ่านแล้ว ${p.progress}/9 ฐาน</div>', icon:'info'})"><td><div class="fw-bold">${p.name}</div><div class="small text-muted fw-number">${p.id}</div></td><td class="text-end"><span class="fw-number">${p.progress}/9</span><div class="progress" style="height:4px"><div class="progress-bar bg-success" style="width:${p.percent}%"></div></div></td></tr>`;
          });
          html += `</tbody></table></div>`;
        } else {
          html = `<div class="text-center p-3"><h5 class="fw-bold mb-3">${r.name}</h5><div class="p-3 bg-light rounded-4 border"><div class="text-muted small mb-1">ผ่านกิจกรรมแล้ว</div><div class="display-6 fw-bold text-primary fw-number">${r.progress} / ${r.total}</div><div class="mt-3"><span class="next-base-tag"><i class="bi bi-geo-alt-fill me-1"></i>ไปที่: ${r.nextBase}</span></div></div></div>`;
        }
        document.getElementById('monResult').innerHTML = html;
      } else { Swal.fire('ไม่พบข้อมูล', 'รหัสพนักงานไม่ถูกต้อง', 'error'); }
    }

    function resetMonitor() { document.getElementById('monId').value = ''; document.getElementById('monResult').innerHTML = ''; }

    async function searchUser() {
      let id = document.getElementById('editId').value.trim();
      if (!id) return;
      const r = await callAPI({ action: 'searchUser', id: id }, 'editSearchBtn');
      if (r) {
        document.getElementById('rowNum').value = r.row;
        document.getElementById('nameBox').value = r.name;
        document.getElementById('deptBox').value = r.dept;
        document.getElementById('sectBox').value = r.sect;
        document.getElementById('emailBox').value = r.email;
        document.getElementById('searchBox').classList.add('d-none');
        document.getElementById('editForm').classList.remove('d-none');
      } else { Swal.fire('ไม่พบข้อมูล', 'ลองตรวจสอบรหัสพนักงานอีกครั้ง', 'warning'); }
    }

    async function saveEdit() {
      const formData = { row: document.getElementById('rowNum').value, name: document.getElementById('nameBox').value, dept: document.getElementById('deptBox').value, sect: document.getElementById('sectBox').value, email: document.getElementById('emailBox').value };
      const r = await callAPI({ action: 'updateUser', formData: formData }, 'editSaveBtn');
      if (r && r.success) { Swal.fire('สำเร็จ', 'อัปเดตข้อมูลแล้ว', 'success'); resetEdit(); }
    }

    function resetEdit() { document.getElementById('searchBox').classList.remove('d-none'); document.getElementById('editForm').classList.add('d-none'); document.getElementById('editId').value = ''; }
  </script>
</body>
</html>
