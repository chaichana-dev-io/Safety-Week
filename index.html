<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SAFETY WEEK 2026</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: 'Kanit', sans-serif; background: #f8f9fc; color: #1a237e; margin: 0; padding: 0; }
    .main-app { max-width: 500px; margin: auto; min-height: 100vh; background: #f8f9fc; position: relative; padding-bottom: 50px; }
    .header-banner { background: #1a237e; color: white; padding: 35px 20px; text-align: center; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; }
    .header-banner h2 { font-weight: 800; letter-spacing: 1px; margin: 0; font-size: 1.8rem; }
    .header-banner p { opacity: 0.8; margin-top: 5px; font-size: 0.9rem; }

    .login-container { padding: 40px 25px; text-align: center; }
    .login-card { background: white; border-radius: 35px; padding: 40px 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
    .login-icon-box { width: 80px; height: 80px; background: #eef2ff; color: #0d6efd; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px; font-size: 2.8rem; }
    .input-pill { height: 60px; border-radius: 20px; text-align: center; font-size: 1.4rem; font-weight: 600; border: 2px solid #eef0f7; background: #fff; color: #333; }
    .btn-pill { height: 60px; border-radius: 20px; font-size: 1.2rem; font-weight: 600; background: #0d6efd; border: none; width: 100%; box-shadow: 0 8px 20px rgba(13,110,253,0.2); }

    #dashboard-page { display: none; padding: 20px; }
    .profile-info { background: white; border-radius: 25px; padding: 18px 20px; margin-bottom: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.03); border: 1px solid #f0f2f8; }
    .target-card { background: white; border-radius: 30px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; border: 1px solid #eef0f7; margin-bottom: 20px; }
    .target-label { background: #0d6efd; color: white; padding: 3px 15px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; display: inline-block; margin-bottom: 10px; }
    .target-name { font-size: 1.8rem; font-weight: 800; color: #0d6efd; margin: 0; }
    
    .base-grid-wrapper { display: flex; justify-content: center; margin: 25px 0; }
    .base-grid { display: grid; grid-template-columns: repeat(3, 60px); gap: 15px; }
    .base-item { width: 60px; height: 60px; border-radius: 15px; background: #eef0f7; color: #bdc3d7; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.5rem; border: 3px solid transparent; transition: 0.3s; }
    .base-item.done { background: #198754 !important; color: #ffc107 !important; border: none; }
    .base-item.next { background: #eef0f7; color: #1a237e; border-color: #ffc107; animation: glowing-yellow 1.5s infinite; }
    
    @keyframes glowing-yellow { 0% { box-shadow: 0 0 5px #ffc107; } 50% { box-shadow: 0 0 18px #ffc107; } 100% { box-shadow: 0 0 5px #ffc107; } }

    #reader { width: 100%; border-radius: 25px; overflow: hidden; display: none; margin-bottom: 20px; }
    .btn-action-main { background: #1a237e; color: white; border-radius: 18px; padding: 18px; width: 100%; font-weight: 700; font-size: 1.1rem; border: none; box-shadow: 0 10px 20px rgba(26,35,126,0.15); transition: 0.3s; }
    .btn-action-main:active { transform: scale(0.98); }
    .btn-action-success { background: #198754; }
    .btn-logout { display: block; text-align: center; color: #bdc3d7; text-decoration: none; margin-top: 25px; font-size: 0.9rem; cursor: pointer; }
  </style>
</head>
<body>

<div class="main-app">
  <div class="header-banner">
    <h2>SAFETY WEEK 2026</h2>
    <p id="subHeaderText">กรุณาเข้าสู่ระบบเพื่อเริ่มภารกิจ</p>
  </div>

  <div id="login-page" class="login-container">
    <div class="login-card">
      <div class="login-icon-box"><i class="bi bi-person-badge-fill"></i></div>
      <h4 class="fw-bold mb-4">ยืนยันตัวตนพนักงาน</h4>
      <input type="number" id="inputEmpId" class="form-control input-pill mb-3" placeholder="รหัสพนักงาน 6 หลัก" onkeypress="if(event.key==='Enter') loginProcess()">
      <button class="btn btn-primary btn-pill shadow-sm" onclick="loginProcess()">เข้าสู่ระบบ</button>
      <p class="text-muted mt-4 small">กรุณาเช็คอินที่จุดลงทะเบียนก่อนเข้าสู่ระบบ</p>
    </div>
  </div>

  <div id="dashboard-page">
    <div class="profile-info">
       <div class="fw-bold" style="font-size: 1.1rem;">
         <span id="pNameDisplay">...</span> <span id="pIdDisplay" class="text-primary"></span>
       </div>
       <div id="pDeptDisplay" class="small text-muted mt-1">...</div>
    </div>

    <div class="target-card">
      <div class="target-label" id="targetLabel">TARGET STATION</div>
      <h3 class="target-name" id="nextBaseLabel">โหลดข้อมูล...</h3>
      <div class="target-id text-muted small mt-1" id="nextBaseId">ID: ---</div>
      
      <div class="mt-4 px-1">
        <div class="d-flex justify-content-between small fw-bold mb-1">
          <span>ความคืบหน้ากิจกรรม</span>
          <span id="progressCount" class="text-primary">0/9</span>
        </div>
        <div class="progress" style="height: 10px; border-radius: 10px; background: #f0f2f8;">
          <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%; background: #0d6efd;"></div>
        </div>
      </div>

      <div class="base-grid-wrapper">
        <div class="base-grid" id="gridContainer"></div>
      </div>

      <div id="reader"></div>
      <button class="btn-action-main" id="mainBtn" onclick="handleMainAction()">
        <i class="bi bi-camera-fill me-2"></i> สแกน QR ฐานกิจกรรม
      </button>

      <div class="btn-logout" onclick="userLogout()">ออกจากระบบ</div>
    </div>
  </div>
</div>

<script>
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbypSiIxg1seOqR2FQkXxq6Jzjpau4g2OWf3djubRwgcYTyrJksGMRr_4jd5miX-Rb3F/exec";
  let activeUser = null;
  let scanner = null;

  // ฟังก์ชันคุยกับ Backend (GitHub -> Google Sheets)
 async function callBackend(data) {
  try {
    // สร้าง URL พร้อมพารามิเตอร์ (เช่น ?action=login&empId=123456)
    const params = new URLSearchParams(data).toString();
    const targetUrl = `${WEB_APP_URL}?${params}`;

    const response = await fetch(targetUrl, {
      method: "GET", // เปลี่ยนเป็น GET
      mode: "cors"   // ลองใช้ cors หรือถ้าไม่ได้ให้เอาบรรทัดนี้ออก
    });

    if (!response.ok) throw new Error("Network response was not ok");
    return await response.json();
  } catch (err) {
    console.error("Fetch Error:", err);
    throw err;
  }
}

  async function loginProcess() {
    const idValue = document.getElementById('inputEmpId').value;
    if(!idValue) return;
    
    Swal.fire({ title: 'กำลังเข้าสู่ระบบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

    try {
      const res = await callBackend({ action: 'getEmployeeStatus', empId: idValue });
      Swal.close();
      
      if(res && res.success) {
        activeUser = res;
        buildDashboard();
      } else if(res && res.error === "not_checked_in") {
        Swal.fire('ยังไม่ได้เช็คอิน', 'กรุณาเช็คอินที่จุดลงทะเบียนเพื่อเปิดสิทธิ์เข้าใช้งาน', 'error');
      } else {
        Swal.fire('ไม่พบข้อมูล', 'โปรดตรวจสอบรหัสพนักงาน หรือติดต่อเจ้าหน้าที่', 'warning');
      }
    } catch (err) {
      Swal.fire('การเชื่อมต่อผิดพลาด', 'กรุณาตรวจสอบอินเทอร์เน็ตของนาย', 'error');
    }
  }

  function buildDashboard() {
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('dashboard-page').style.display = 'block';
    document.getElementById('subHeaderText').innerText = "ยินดีต้อนรับเข้าสู่ระบบ";
    
    document.getElementById('pNameDisplay').innerText = activeUser.name;
    document.getElementById('pIdDisplay').innerText = " [" + activeUser.id + "]";
    document.getElementById('pDeptDisplay').innerText = activeUser.dept;
    
    let doneCount = activeUser.doneBases.length;
    let targetBaseId = "";

    if (doneCount === 9) {
      // เคส: ผ่านครบทุกฐาน
      document.getElementById('targetLabel').style.display = 'none';
      document.getElementById('nextBaseLabel').innerText = "ยินดีด้วยคุณผ่านครบทุกฐานแล้ว";
      document.getElementById('nextBaseLabel').className = "target-name text-success";
      document.getElementById('nextBaseId').innerText = "ภารกิจเสร็จสิ้น!";
      document.getElementById('mainBtn').innerHTML = '<i class="bi bi-patch-check-fill me-2"></i> สร้างใบประกาศ (PDF)';
      document.getElementById('mainBtn').classList.add('btn-action-success');
      targetBaseId = "FINISH";
    } else {
      // เคส: ยังไม่ครบ
      targetBaseId = doneCount === 0 ? activeUser.startBase : "Base" + (doneCount + 1);
      document.getElementById('nextBaseLabel').innerText = targetBaseId.replace("Base", "ฐานที่ ");
      document.getElementById('nextBaseId').innerText = "ID: " + targetBaseId;
      document.getElementById('mainBtn').innerHTML = '<i class="bi bi-camera-fill me-2"></i> สแกน QR ฐานกิจกรรม';
      document.getElementById('mainBtn').classList.remove('btn-action-success');
    }

    document.getElementById('progressCount').innerText = doneCount + "/9";
    document.getElementById('progressBar').style.width = (doneCount/9*100) + "%";
    
    drawGrid(targetBaseId);
  }

  function drawGrid(targetBaseId) {
    let html = '';
    for(let i=1; i<=9; i++) {
      let currentId = 'Base' + i;
      let state = activeUser.doneBases.includes(currentId) ? 'done' : (currentId === targetBaseId ? 'next' : '');
      html += `<div class="base-item ${state}">${i}</div>`;
    }
    document.getElementById('gridContainer').innerHTML = html;
  }

  function handleMainAction() {
    if (activeUser.doneBases.length === 9) {
      generateCertificate();
    } else {
      toggleCamera();
    }
  }

  function toggleCamera() {
    const div = document.getElementById('reader');
    if(div.style.display === 'none') {
      div.style.display = 'block';
      if (!scanner) scanner = new Html5Qrcode("reader");
      scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
        closeCamera();
        askBasePassword(txt);
      }).catch(err => Swal.fire('Error', 'ไม่สามารถเข้าถึงกล้องได้', 'error'));
    } else { closeCamera(); }
  }

  function closeCamera() {
    if(scanner && scanner.isScanning) {
      scanner.stop().then(() => { document.getElementById('reader').style.display = 'none'; });
    } else {
      document.getElementById('reader').style.display = 'none';
    }
  }

  async function askBasePassword(baseId) {
    const { value: password } = await Swal.fire({
      title: 'รหัสผ่านฐาน ' + baseId.replace("Base", ""),
      input: 'password',
      inputPlaceholder: 'กรอกรหัสผ่านจากกรรมการ',
      showCancelButton: true,
      confirmButtonText: 'ยืนยัน',
      cancelButtonText: 'ยกเลิก'
    });

    if (password) {
      Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      try {
        const res = await callBackend({ 
          action: 'recordBaseScan', 
          empId: activeUser.id, 
          baseId: baseId, 
          password: password 
        });
        
        if(res.status === 'success') {
          Swal.fire({ icon: 'success', title: 'ผ่านฐานสำเร็จ!', timer: 2000, showConfirmButton: false }).then(() => loginProcess());
        } else {
          Swal.fire('รหัสผ่านไม่ถูกต้อง', 'กรุณาสอบถามกรรมการประจำฐานอีกครั้ง', 'error');
        }
      } catch (e) {
        Swal.fire('Error', 'บันทึกไม่สำเร็จ', 'error');
      }
    }
  }

  async function generateCertificate() {
    Swal.fire({
      title: 'ยืนยันการสร้างใบประกาศ',
      text: "ระบบจะสร้างไฟล์ PDF ในชื่อของคุณ",
      icon: 'question',
      showCancelButton: true,
      confirmButtonText: 'สร้างไฟล์',
      cancelButtonText: 'ยกเลิก'
    }).then(async (result) => {
      if (result.isConfirmed) {
        Swal.fire({ title: 'กำลังสร้าง PDF...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        try {
          const res = await callBackend({ action: 'generateCertificate', empId: activeUser.id });
          if(res.success) {
            Swal.fire({ icon: 'success', title: 'สำเร็จ!', text: 'สร้างใบประกาศเรียบร้อยแล้ว' }).then(() => {
              window.open(res.url, '_blank');
            });
          } else {
            Swal.fire('ไม่สำเร็จ', res.message, 'error');
          }
        } catch (e) {
          Swal.fire('Error', 'ไม่สามารถเชื่อมต่อเพื่อสร้าง PDF ได้', 'error');
        }
      }
    });
  }

  function userLogout() {
    activeUser = null;
    document.getElementById('inputEmpId').value = '';
    document.getElementById('dashboard-page').style.display = 'none';
    document.getElementById('login-page').style.display = 'block';
    document.getElementById('subHeaderText').innerText = "กรุณาเข้าสู่ระบบเพื่อเริ่มภารกิจ";
    if(scanner) closeCamera();
  }
</script>
</body>
</html>
